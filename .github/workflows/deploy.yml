name: Passtival-Backend of Deploy to Production
on:
  push:
    branches:
      - main # main에 푸시될 때 실행
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  DEPLOY_DIR: ${{ vars.DEPLOY_DIR }}
  DEPLOY_ENV_PATH: ${{ vars.DEPLOY_ENV_PATH }}
  DEPLOY_MOUNT_PATH: ${{ vars.DEPLOY_MOUNT_PATH }}
  EC2_TARGET_TAG_KEY: ${{ vars.EC2_TARGET_TAG_KEY }}
  EC2_TARGET_TAG_VALUE: ${{ vars.EC2_TARGET_TAG_VALUE }}
  HEALTHCHECK_PATH: ${{ vars.HEALTHCHECK_PATH }}
  HEALTHCHECK_TIMEOUT_SECONDS: ${{ vars.HEALTHCHECK_TIMEOUT_SECONDS }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 체크아웃 코드
        uses: actions/checkout@v3

      - name: JDK-17 설치
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 배포 설정값 검증
        run: |
          test -n "${AWS_REGION}"
          test -n "${DEPLOY_DIR}"
          test -n "${DEPLOY_ENV_PATH}"
          test -n "${DEPLOY_MOUNT_PATH}"
          test -n "${EC2_TARGET_TAG_KEY}"
          test -n "${EC2_TARGET_TAG_VALUE}"
          test -n "${HEALTHCHECK_PATH}"
          test -n "${HEALTHCHECK_TIMEOUT_SECONDS}"

      - name: gradlew 실행 권한 부여, Gradle 빌드
        working-directory: backend
        run: |
          chmod +x gradlew
          ./gradlew build -x test

      - name: Docker Hub 로그인
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 빌드 및 Docker 이미지 푸시
        run: |
          docker build \
            -t ${{ secrets.DOCKER_USERNAME }}/passtival-spring:${{ github.sha }} \
            -t ${{ secrets.DOCKER_USERNAME }}/passtival-spring:latest \
            ./backend
          docker push ${{ secrets.DOCKER_USERNAME }}/passtival-spring:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/passtival-spring:latest

      - name: AWS 자격 증명 구성 (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: 배포 대상 인스턴스 조회
        id: discover
        run: |
          INSTANCE_IDS_RAW=$(aws ec2 describe-instances \
            --filters "Name=tag:${EC2_TARGET_TAG_KEY},Values=${EC2_TARGET_TAG_VALUE}" "Name=instance-state-name,Values=running" \
            --query "Reservations[].Instances[].InstanceId" \
            --output text)

          mapfile -t INSTANCE_IDS < <(printf '%s\n' ${INSTANCE_IDS_RAW} | sed '/^$/d' | sort)
          COUNT=${#INSTANCE_IDS[@]}

          echo "Discovered instances (${COUNT}): ${INSTANCE_IDS[*]}"

          if [[ "${COUNT}" -ne 2 ]]; then
            echo "Expected exactly 2 running instances for ${EC2_TARGET_TAG_KEY}=${EC2_TARGET_TAG_VALUE}, but got ${COUNT}."
            exit 1
          fi

          echo "instance_1=${INSTANCE_IDS[0]}" >> "$GITHUB_OUTPUT"
          echo "instance_2=${INSTANCE_IDS[1]}" >> "$GITHUB_OUTPUT"

      - name: 인스턴스 1 롤링 배포
        env:
          TARGET_INSTANCE_ID: ${{ steps.discover.outputs.instance_1 }}
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${TARGET_INSTANCE_ID}" \
            --document-name "AWS-RunShellScript" \
            --comment "passtival backend deploy ${GITHUB_SHA} on ${TARGET_INSTANCE_ID}" \
            --parameters commands="cd ${DEPLOY_DIR} && chmod +x run.sh && test -f ${DEPLOY_ENV_PATH} && DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }} ENV_FILE_PATH=${DEPLOY_ENV_PATH} DEPLOY_MOUNT_PATH=${DEPLOY_MOUNT_PATH} IMAGE_TAG=${GITHUB_SHA} DEPLOY_MODE=prod ./run.sh && timeout ${HEALTHCHECK_TIMEOUT_SECONDS}s sh -c 'until curl -fsS http://127.0.0.1:8080${HEALTHCHECK_PATH} >/dev/null; do sleep 5; done'" \
            --query "Command.CommandId" \
            --output text)

          for _ in {1..40}; do
            STATUS=$(aws ssm list-command-invocations \
              --command-id "${COMMAND_ID}" \
              --details \
              --query "CommandInvocations[0].Status" \
              --output text)
            echo "[${TARGET_INSTANCE_ID}] status=${STATUS}"

            if [[ "${STATUS}" == "Success" ]]; then
              exit 0
            fi

            if [[ "${STATUS}" == "Cancelled" || "${STATUS}" == "Cancelling" || "${STATUS}" == "Failed" || "${STATUS}" == "TimedOut" || "${STATUS}" == "Undeliverable" || "${STATUS}" == "Terminated" ]]; then
              aws ssm list-command-invocations \
                --command-id "${COMMAND_ID}" \
                --details \
                --query "CommandInvocations[0].CommandPlugins[0].Output" \
                --output text || true
              exit 1
            fi

            sleep 15
          done

          echo "[${TARGET_INSTANCE_ID}] SSM command did not finish in time."
          exit 1

      - name: 인스턴스 2 롤링 배포
        env:
          TARGET_INSTANCE_ID: ${{ steps.discover.outputs.instance_2 }}
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${TARGET_INSTANCE_ID}" \
            --document-name "AWS-RunShellScript" \
            --comment "passtival backend deploy ${GITHUB_SHA} on ${TARGET_INSTANCE_ID}" \
            --parameters commands="cd ${DEPLOY_DIR} && chmod +x run.sh && test -f ${DEPLOY_ENV_PATH} && DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }} ENV_FILE_PATH=${DEPLOY_ENV_PATH} DEPLOY_MOUNT_PATH=${DEPLOY_MOUNT_PATH} IMAGE_TAG=${GITHUB_SHA} DEPLOY_MODE=prod ./run.sh && timeout ${HEALTHCHECK_TIMEOUT_SECONDS}s sh -c 'until curl -fsS http://127.0.0.1:8080${HEALTHCHECK_PATH} >/dev/null; do sleep 5; done'" \
            --query "Command.CommandId" \
            --output text)

          for _ in {1..40}; do
            STATUS=$(aws ssm list-command-invocations \
              --command-id "${COMMAND_ID}" \
              --details \
              --query "CommandInvocations[0].Status" \
              --output text)
            echo "[${TARGET_INSTANCE_ID}] status=${STATUS}"

            if [[ "${STATUS}" == "Success" ]]; then
              exit 0
            fi

            if [[ "${STATUS}" == "Cancelled" || "${STATUS}" == "Cancelling" || "${STATUS}" == "Failed" || "${STATUS}" == "TimedOut" || "${STATUS}" == "Undeliverable" || "${STATUS}" == "Terminated" ]]; then
              aws ssm list-command-invocations \
                --command-id "${COMMAND_ID}" \
                --details \
                --query "CommandInvocations[0].CommandPlugins[0].Output" \
                --output text || true
              exit 1
            fi

            sleep 15
          done

          echo "[${TARGET_INSTANCE_ID}] SSM command did not finish in time."
          exit 1
