spring:
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
  datasource:
    url: ${DB_URL}
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  security:
    oauth2:
      client:
        registration:
          kakao:
            client-name: ${KAKAO_CLIENT_NAME}
            client-authentication-method: client_secret_post
            client-id: ${KAKAO_CLIENT_ID}
            client-secret: ${KAKAO_CLIENT_SECRET}
            redirect-uri: ${KAKAO_REDIRECT_URI}
            authorization-grant-type: ${KAKAO_AUTHORIZATION_GRANT_TYPE}
            scope: ${KAKAO_SCOPE}
        provider:
          kakao:
            authorization-uri: ${KAKAO_AUTHORIZATION_URI}
            token-uri: ${KAKAO_TOKEN_URI}
            user-info-uri: ${KAKAO_USER_INFO_URI}
            user-name-attribute: ${KAKAO_USER_NAME_ATTRIBUTE}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.MySQL8Dialect
        use_sql_comments: false
  matching:
    cron: ${MATCHING_CRON}
    cleanup-cron: ${MATCHING_CLEANUP_CRON}
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  forward-headers-strategy: native

cloud:
  aws:
    credentials:
      access-key: ${AWS_ACCESS_KEY}
      secret-key: ${AWS_SECRET_KEY}
    region:
      static: ${AWS_REGION}
    s3:
      bucket: ${AWS_S3_BUCKET}
      presigned-url:
        expiration-minutes: 10 # presigned URL 만료 시간 (분 단위)

discord:
  webhook:
    url: ${DISCORD_WEBHOOK_URL}

swagger:
  server:
    url: ${SWAGGER_SERVER_URL}
    description: "운영 서버"

logging:
  level:
    root: info
    com.passtival.backend: info

jwt:
  secret: ${JWT_SECRET_KEY}
  access-token-expiration: ${JWT_ACCESS_EXPIRATION}
  refresh-token-expiration: ${JWT_REFRESH_EXPIRATION}

admin:
  seed-key: ${ADMIN_SEED_KEY}
  username: ${ADMIN_USERNAME}
  password: ${ADMIN_PASSWORD}

MATCHING_BLOCK: ${MATCHING_BLOCK}

seed:
  auth-keys-path: ${SEED_AUTH_KEYS_PATH}

frontend:
  login-url: ${FRONTEND_LOGIN_URL}
  login-fail-url: ${FRONTEND_LOGIN_FAIL_URL}
